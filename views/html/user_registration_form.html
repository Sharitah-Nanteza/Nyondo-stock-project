<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyondo Hardware - Register</title>
    <link rel="stylesheet" href="/css/user_registration_form.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>NYONDO General Hardware LTD</h1>
        <p>Nansana, Wakiso District</p>
      </div>

      <h2>Registration form</h2>

      <form action="/registration" method="post">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            id="name"
            type="text"
            name="name"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            name="password"
            placeholder="At least 6 characters"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input
            id="confirm_password"
            type="password"
            name="confirm_password"
            placeholder="Re-enter password"
            required
          />
        </div>

        <!-- <div class="text-center">
         <a href="dashboard.html" class="btn-create">+ Create Account</a>
        </div> -->
        <button type="submit">Create Account</button>
      </form>

      <div class="footer">
        Already have an account? <a href="index.html">Login here</a>
      </div>
    </div>
  </body>
</html>
