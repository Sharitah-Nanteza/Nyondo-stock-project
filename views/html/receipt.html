<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transaction Receipt - Nyondo Hardware</title>
    <link rel="stylesheet" href="/public/css/receipt.css" />
  </head>
  <body>
    <div class="receipt-card">
      <div class="receipt-header">
        <h1>NYONDO GENERAL HARDWARE</h1>
        <p>Quality Building Materials & Hardware</p>
      </div>

      <div class="receipt-body">
        <div class="info-row">
          <span class="info-label">Receipt No:</span>
          <span class="info-value">#NYO-2026-0042</span>
        </div>
        <div class="info-row">
          <span class="info-label">Date:</span>
          <span class="info-value">May 11, 2026</span>
        </div>
        <div class="info-row">
          <span class="info-label">Customer:</span>
          <span class="info-value">Walk-in Client</span>
        </div>
        <div class="info-row">
          <span class="info-label">Item Purchased:</span>
          <span class="info-value">Tororo Cement (50kg Bag)</span>
        </div>
        <div class="info-row">
          <span class="info-label">Quantity:</span>
          <span class="info-value">10 Bags</span>
        </div>

        <!-- Financial info displayed in one row -->
        <div class="financial-summary">
          <div class="fin-box">
            <label>Unit Price</label>
            <span>32,000</span>
          </div>
          <div class="fin-box">
            <label>Total Paid</label>
            <span>320,000</span>
          </div>
          <div class="fin-box">
            <label>Balance</label>
            <span>0</span>
          </div>
        </div>
      </div>

      <div class="footer">
        <p>Thank you for shopping with us!</p>
        <p>Issued by: Sales Attendant - [Name]</p>
        <button
          class="no-print"
          onclick="window.print()"
          style="margin-top: 10px; cursor: pointer"
        >
          Print Receipt
        </button>
      </div>
    </div>
  </body>
</html>
