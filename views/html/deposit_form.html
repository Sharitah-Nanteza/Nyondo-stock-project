<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Deposit Form</title>
         <link rel="stylesheet" href="/css/deposit_form.css">
</head>
<body>

<div class="form-card">
    <h2>Record New Deposit</h2>
    
    <form action="/deposit" method="post">
        <div class="input-group">
            <label for="name">Name of Customer</label>
            <input id="name" type="text" name="name" placeholder="John Doe" class="amount-input" required>
            <!-- <div class="read-only-box">David Okello</div> -->
        </div>

        <div class="input-group">
            <label for="amount">Current Total Amount</label>
            <input id="amount" type="text" name="total" placeholder="eg 456,000" class="amount-input" required>
            <!-- <div class="read-only-box">456,000 UGX</div> -->
        </div>

        <div class="input-group">
            <label for="new-amount">Amount to Deposit (UGX)</label>
            <input type="number" id="new-amount" name="amount" class="amount-input" placeholder="e.g. 50000" required>
        </div>

        <div class="input-group">
            <label>Select Payment Method</label>
            <div class="method-container">
                <div class="method-option">
                    <input type="radio" name="payment" id="cash" value="cash" checked>
                    <label for="cash">Cash</label>
                </div>
                <div class="method-option">
                    <input type="radio" name="payment" id="momo" value="momo">
                    <label for="momo">Mobile Money</label>
                </div>
                <div class="method-option">
                    <input type="radio" name="payment" id="bank" value="bank">
                    <label for="bank">Bank Transfer</label>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn btn-cancel">Cancel</button>
            <button type="submit" class="btn btn-submit">Record Deposit</button>
        </div>
    </form>
</div>

</body>
</html>
