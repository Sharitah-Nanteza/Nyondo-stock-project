<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyondo Hardware - Customer Deposit Registration</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="/public/css/deposit_reg_form.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <!-- Card Header -->
        <div class="card-header">
          <h2>Deposit Registration Scheme </h2>
          <p class="subtitle">Nyondo General Hardware</p>
        </div>

        <!-- Card Body / Form -->
        <div class="card-body">
          <form action="/deposited" method="POST" id="depositForm">
            <!-- Section: Customer Info -->
            <fieldset class="form-section">
              <legend>Customer Information</legend>

              <div class="form-group">
                <label for="fullName">Full Name</label>
                <input
                  type="text"
                  id="fullName"
                  name="fullName"
                  placeholder="e.g., John Mukasa"
                  required
                />
              </div>

              <div class="form-row">
                <div class="form-group col">
                  <label for="nin">NIN (National ID Number)</label>
                  <input
                    type="text"
                    id="nin"
                    name="nin"
                    placeholder="CM12345678XYZ"
                    pattern="^[A-Z]{2}[0-9]{7}[A-Z0-9]{5}$"
                    required
                  />
                  <!-- <span class="help-text">Format: 14 characters</span> -->
                </div>

                <div class="form-group col">
                  <label for="phoneNumber">Phone Number</label>
                  <input
                    type="tel"
                    id="phoneNumber"
                    name="phoneNumber"
                    placeholder="0772123456"
                    pattern="^(07[0-9]{8})|(\+256[0-9]{9})$"
                    required
                  />
                  <!-- <span class="help-text">Format: 07... or +256...</span> -->
                </div>
              </div>
            </fieldset>

            <!-- Section: Deposit Details -->
            <fieldset class="form-section">
              <legend>Product Deposit Details</legend>

              <div class="form-group">
                <label for="itemSelected">Select Item</label>
                <select id="itemSelected" name="itemSelected" required>
                  <option value="" selected disabled>Choose an item</option>
                  <option value="Cement">Cement (Bags)</option>
                  <option value="Iron Sheets">Iron Sheets (Gauges)</option>
                  <option value="Iron Bars">Iron Bars (Pieces)</option>
                </select>
              </div>

              <div class="form-row">
                <div class="form-group col">
                  <label for="quantity">Quantity</label>
                  <input
                    type="number"
                    id="quantity"
                    name="quantity"
                    min="1"
                    placeholder="Minimum 1"
                    required
                  />
                </div>

                <div class="form-group col">
                  <label for="amountDeposited">Amount Deposited</label>
                  <div class="input-prefix-group">
                    <span class="prefix">UGX</span>
                    <input
                      type="number"
                      id="amountDeposited"
                      name="amountDeposited"
                      min="1000"
                      step="500"
                      placeholder="e.g., 50,000"
                      required
                    />
                  </div>
                </div>
              </div>
            </fieldset>

            <!-- Action Buttons -->
            <div class="button-group">
              <button type="submit" class="btn btn-primary">
                Register Deposit
              </button>
              <a href="/dashboard" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
